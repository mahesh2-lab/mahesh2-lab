name: generate arcade contribution graphs

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: generate contribution graph SVGs
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: ${{ github.repository_owner }}
          # Comma-separated list of valid game names (default: pacman)
          games: 'bomberman'
          
      - name: Delay SVG rendering by 3 seconds
        run: |
          python3 -c "
          import glob, re
          for f in glob.glob('dist/*.svg'):
              with open(f, 'r', encoding='utf-8') as file:
                  content = file.read()
              style = '<style>@keyframes fadeInDelay { 0% { opacity: 0; } 99% { opacity: 0; } 100% { opacity: 1; } } .delayed-wrapper { opacity: 0; animation: fadeInDelay 3s linear forwards; }</style><g class=\"delayed-wrapper\">'
              content = re.sub(r'(<svg[^>]*>)', r'\1' + style, content, count=1)
              content = content.replace('</svg>', '</g></svg>')
              with open(f, 'w', encoding='utf-8') as file:
                  file.write(content)
          "

      - name: push SVGs to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
