name: Update profile art

# Refreshes the contribution graph SVG daily from real data.
# Runs daily, plus whenever you push to main, plus on-demand.

"on":
  schedule:
    - cron: "0 */6 * * *"   # Run every 6 hours
  workflow_dispatch: {}
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  heatmap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Scrape real contribution data (no auth needed)
        run: python scripts/fetch_contributions.py

      - name: Pick random game
        id: pick_game
        run: |
          python -c "import random, os; game = random.choice(['bomberman', 'minesweeper', 'puzzle-bobble', 'galaga', 'breakout', 'pacman']); print(f'game={game}'); f = open(os.environ['GITHUB_OUTPUT'], 'a'); f.write(f'game={game}\n'); f.close()"

      - name: Generate random game contribution graph SVG
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: ${{ github.repository_owner }}
          games: ${{ steps.pick_game.outputs.game }}


      - name: Generate ASCII portrait
        run: |
          if [ -f "source-prepped.png" ]; then
            python scripts/make_ascii_svg.py
          fi

      - name: Render animated contribution graph SVG
        env:
          CHOSEN_GAME: ${{ steps.pick_game.outputs.game }}
        run: |
          python scripts/render_heatmap_svg.py

      - name: Commit updated art
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: refresh contribution graphs and portrait [skip ci]"
          file_pattern: "data/contributions.json contrib-heatmap.svg dist/* avi-ascii.svg source-prepped.png"
